<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popsy Pop Prep - Coach Jose Sandoval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: white;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s ease, shadow 0.2s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .option-btn-active {
            background-color: #2563eb !important;
            color: white !important;
            border-color: #2563eb !important;
        }
        .speaker-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Header -->
    <header class="bg-blue-700 text-white py-12 px-6 text-center shadow-xl mb-8">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl font-extrabold tracking-tight">Popsy Pop Prep App</h1>
            <p class="mt-3 text-blue-100 text-lg">Entrenador: <span class="font-semibold text-white italic underline">Jose Sandoval</span></p>
            <div class="mt-6 flex justify-center gap-4">
                <span class="bg-blue-800 px-4 py-2 rounded-full text-xs font-bold border border-blue-400">VISA H-2B</span>
                <span class="bg-blue-800 px-4 py-2 rounded-full text-xs font-bold border border-blue-400">ICE CREAM VENDOR 🍦</span>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 pb-24">
        <!-- Dashboard / Info -->
        <div class="mb-8 p-6 bg-white rounded-2xl border-l-8 border-orange-500 shadow-sm">
            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-500" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                </svg>
                Actualización de Datos
            </h2>
            <p class="mt-2 text-slate-600 text-sm leading-relaxed">
                Equipo, atención a estos cambios: El contrato es por <strong>35 horas semanales</strong> y la empresa nos <strong>asiste</strong> con la vivienda (no la provee directamente).
            </p>
        </div>

        <!-- Questions Feed -->
        <div id="questions-container" class="space-y-6">
            <!-- Questions injected by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="fixed bottom-0 w-full bg-white border-t py-4 text-center text-slate-500 text-sm shadow-inner">
        &copy; 2024 Prep App - Coach Jose Sandoval - <strong>Popsy Pop Team</strong>
    </footer>

    <script>
        const questions = [
            {
                id: 1,
                q: "What is the purpose of your trip to the United States?",
                a: "I am going to work temporarily as an Ice Cream Vendor for Popsy Pop with an H-2B visa."
            },
            {
                id: 2,
                q: "Which company are you going to work for?",
                a: "The company is called Popsy Pop."
            },
            {
                id: 3,
                q: "Where is the company located?",
                a: "It is located in Somerdale, New Jersey, at 750 Kennedy Boulevard."
            },
            {
                id: 4,
                q: "How long do you plan to stay in the United States?",
                a: "I will stay for the duration of my contract, which is from April 1st to October 26th."
            },
            {
                id: 5,
                q: "What is your salary going to be?",
                a: "My salary will be 19 dollars and 35 cents per hour."
            },
            {
                id: 6,
                q: "How many hours a week will you work?",
                a: "According to my contract, I will work thirty-five hours per week."
            },
            {
                id: 7,
                q: "What will your specific duties be at this job?",
                a: "I will be driving the ice cream truck, serving ice cream, providing customer service, and helping in special events."
            },
            {
                id: 8,
                q: "How did you find out about this job opportunity?",
                options: [
                    { label: "Ministerio", text: "I found out through the Ministry of Labor recruitment programs." },
                    { label: "Internet/Redes", text: "I found the vacancy through social media and applied directly to the company." },
                    { label: "Amigo", text: "A friend who worked there before recommended me and told me about the vacancy." }
                ]
            },
            {
                id: 9,
                q: "Do you have a copy of your job offer or contract?",
                a: "Yes, I have it right here."
            },
            {
                id: 10,
                q: "Who is paying for your travel expenses?",
                a: "My employer, Popsy Pop, is covering the travel expenses."
            },
            {
                id: 11,
                q: "Do you have previous experience for this type of work?",
                options: [
                    { label: "Ventas/Cliente", text: "Yes, I have experience in customer service and sales." },
                    { label: "Conducción", text: "Yes, I am a skilled driver and I am used to working long hours outdoors." }
                ]
            },
            {
                id: 12,
                q: "What do you do here in El Salvador?",
                options: [
                    { label: "Call Center", text: "I currently work in a Call Center providing customer support." },
                    { label: "Construcción", text: "I work in construction and general maintenance." },
                    { label: "Madera/Carpintería", text: "I work in woodworking and carpentry." }
                ]
            },
            {
                id: 13,
                q: "Where will you be living while you are in the U.S.?",
                a: "The company is assisting me with housing arrangements in New Jersey for the duration of the season."
            },
            {
                id: 14,
                q: "Have you ever been to the United States before?",
                options: [
                    { label: "SÍ", text: "Yes, I have visited the United States before and I returned to my country on time." },
                    { label: "NO", text: "No, I have never been to the United States before." }
                ]
            },
            {
                id: 15,
                q: "Do you have any family members living in the United States?",
                options: [
                    { label: "SÍ", text: "Yes, I have family in the United States, but I will be working in New Jersey and returning home when the job is done." },
                    { label: "NO", text: "No, I do not have any family members living in the United States." }
                ]
            },
            {
                id: 16,
                q: "What ties you to El Salvador?",
                a: "My family lives here, and I have my life and my roots in El Salvador."
            },
            {
                id: 17,
                q: "What are your plans after your contract ends?",
                a: "I will return to El Salvador to be with my family and use my savings to improve my house and start a small business."
            },
            {
                id: 18,
                q: "Why should we grant you this visa?",
                a: "Because I am a hardworking person with the necessary skills, I want to help the company, and I will strictly follow the visa rules and return home in October."
            },
            {
                id: 19,
                q: "Have you ever been arrested or had legal problems?",
                a: "No, never."
            },
            {
                id: 20,
                q: "Do you understand that you cannot work for any other employer?",
                a: "Yes, I clearly understand that my visa is only for Popsy Pop and I cannot work for anyone else."
            }
        ];

        const container = document.getElementById('questions-container');
        const selectedTexts = {};

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.8; 
                utterance.pitch = 1.0;
                const voices = window.speechSynthesis.getVoices();
                const engVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) || 
                                 voices.find(v => v.lang === 'en-US');
                if (engVoice) utterance.voice = engVoice;
                window.speechSynthesis.speak(utterance);
            }
        }

        questions.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'glass-card p-6 rounded-2xl shadow-sm border-l-4 border-l-blue-600';
            
            let answerHtml = '';
            if (item.options) {
                answerHtml = `
                    <div class="mt-5 space-y-4">
                        <div class="flex gap-2 mb-2 flex-wrap">
                            ${item.options.map((opt, i) => `
                                <button onclick="selectOption(${index}, ${i}, this)" 
                                        class="px-4 py-2 text-xs border rounded-lg border-slate-200 text-slate-600 hover:bg-slate-50 transition-all font-bold uppercase tracking-tighter">
                                    ${opt.label}
                                </button>
                            `).join('')}
                        </div>
                        <div class="flex items-start gap-4 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                            <p id="ans-text-${index}" class="text-slate-700 text-sm flex-1 italic font-medium leading-relaxed text-blue-900">
                                [Selecciona una opción arriba]
                            </p>
                            <button onclick="speakSelected(${index})" class="speaker-btn p-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-md transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.983 5.983 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.984 3.984 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            } else {
                answerHtml = `
                    <div class="mt-5 flex items-start gap-4 bg-slate-100/50 p-4 rounded-xl border border-slate-200">
                        <p class="text-slate-700 text-sm flex-1 italic font-medium leading-relaxed">"${item.a}"</p>
                        <button onclick="speak('${item.a.replace(/'/g, "\\'")}')" class="speaker-btn p-3 bg-slate-700 text-white rounded-full hover:bg-slate-900 shadow-md transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.983 5.983 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.984 3.984 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter shadow-sm">Pops Question ${item.id}</span>
                </div>
                <div class="flex items-start gap-3">
                    <h3 class="text-slate-900 font-bold text-xl leading-tight flex-1">${item.q}</h3>
                    <button onclick="speak('${item.q.replace(/'/g, "\\'")}')" class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                </div>
                ${answerHtml}
            `;
            container.appendChild(card);
        });

        window.selectOption = function(qIndex, optIndex, btn) {
            const textDisplay = document.getElementById(`ans-text-${qIndex}`);
            const text = questions[qIndex].options[optIndex].text;
            textDisplay.innerText = `"${text}"`;
            selectedTexts[qIndex] = text;
            const parent = btn.parentElement;
            parent.querySelectorAll('button').forEach(b => b.classList.remove('option-btn-active'));
            btn.classList.add('option-btn-active');
        };

        window.speakSelected = function(qIndex) {
            const text = selectedTexts[qIndex];
            if (text) speak(text);
            else alert("Jose Sandoval dice: ¡Primero selecciona una opción antes de escuchar!");
        };

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
